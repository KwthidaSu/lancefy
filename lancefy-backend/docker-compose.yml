version: "3.9"

services:
  # Database (Postgres)
  backend-db:
    image: postgres:15
    container_name: backend_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - backend_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Redis
  backend-redis:
    image: redis:7
    container_name: backend_redis
    ports:
      - "6380:6379"  
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # MinIO
  backend-storage:
    image: minio/minio
    container_name: backend_storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - backend_minio_data:/data
    ports:
      - "9002:9000" 
      - "9003:9001" 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    restart: unless-stopped

  # API (FastAPI)
  backend-api:
    build: .
    container_name: backend_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    depends_on:
      backend-db:
        condition: service_healthy
      backend-redis:
        condition: service_healthy
      backend-storage:
        condition: service_healthy
    ports:
      - "8000:8000" 
    volumes:
      - .:/app
    restart: unless-stopped

  # Celery Worker
  backend-worker:
    build: .
    container_name: backend_worker
    command: celery -A app.workers.celery_app worker -l info
    env_file:
      - .env
    depends_on:
      backend-db:
        condition: service_healthy
      backend-redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  # Celery Beat
  backend-scheduler:
    build: .
    container_name: backend_scheduler
    command: celery -A app.workers.celery_app beat -l info
    env_file:
      - .env
    depends_on:
      backend-redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  # Keycloak
  backend-auth:
    image: quay.io/keycloak/keycloak:23.0
    container_name: backend_auth
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://backend-db:5432/${KEYCLOAK_POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./themes:/opt/keycloak/themes
      - ./realm-export.json:/opt/keycloak/data/import/realm.json
    depends_on:
      backend-db:
        condition: service_healthy
    ports:
      - "8081:8080"  
    restart: unless-stopped

volumes:
  backend_postgres_data:
  backend_minio_data:
